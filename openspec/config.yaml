schema: spec-driven

context: |
  Tech stack: TypeScript (strict), Bun, Elysia 1.x, Prisma + PostgreSQL,
  BullMQ + Redis, Clerk for authentication, Biome for lint and format.
  Monorepo with Bun workspaces:
  - .oneJs/<core,server,event-bus,jobs,prisma,auth> — internal framework
    packages, published under the @OneJs/ prefix
  - packages/<task,user,shared> — bounded contexts, exported under the
    @<context-name> prefix (e.g. @task, @user, @shared)
  - apps/<api,notifications> — thin shells that wire packages together
    (no domain logic in apps)
  Architecture: Domain-Driven Design with Hexagonal Architecture
  (Ports & Adapters). Each bounded context lives in packages/<context>/
  and is organized in three layers — domain (entities, value objects,
  repository interfaces, domain events) → application (services that
  expose a single run() entry point, DTOs) → infrastructure (adapters
  implementing ports, InMemory + Prisma repositories, HTTP controllers).
  Bounded contexts communicate only through application services or
  domain ports, never through direct adapter coupling.
  Auth: Clerk integrated via @OneJs/auth.
  Testing: bun test runner. Unit tests (*.test.ts) live in tests/ and use
  InMemory fakes only — zero mocks, stubs or spies. Integration tests
  (*.integration.test.ts) may mock external libraries when needed.
  Linting: Biome (bun run lint, bun run lint:fix, bun run format).
  All code, comments, and documentation in English.

  Project guidelines (source of truth): All artifact creation and
  implementation MUST read and follow the guidelines in AGENTS.md
  (root) and docs/conventions/, plus the per-topic skills in
  .agents/skills/guidelines/:
  - guidelines/hexagonal-architecture — bounded contexts, inward-only
    layer dependencies, repository port/adapter, application services
    with run(), no primitives as parameters
  - guidelines/design-principles — kebab-case files, PascalCase classes,
    camelCase methods, run() entry point, @Injectable()/@Inject() DI,
    no getters/setters, rich domain models, OneJsError for all errors,
    no JSDoc unless requested
  - guidelines/testing-standards — bun:test runner, AAA structure,
    business-oriented describe/test names, InMemory fakes over mocks,
    tests in dedicated tests/ folder, integration tests as
    *.integration.test.ts, FIRST principles
  - guidelines/tdd-practices — 5-step cycle (Reason → Red → Green →
    Refactor → Re-evaluate), TPP, inside-out development (domain →
    application → infrastructure)
  - guidelines/git-strategy — Conventional Commits, feature branches
    off main, mandatory lint:fix + typecheck + test before commit

rules:
  proposal:
    - Always include a Non-Goals section
    - Reference affected paths under .oneJs/*, packages/*, and apps/*
    - Identify which bounded context(s) the change belongs to
  specs:
    - Write scenarios in Given/When/Then format
    - Organize specs by bounded context matching the packages/ structure
    - Include edge cases and error scenarios
  design:
    - Read .agents/skills/guidelines/hexagonal-architecture/ and
      .agents/skills/guidelines/design-principles/ references before
      designing
    - Map components to hexagonal layers (domain, application,
      infrastructure)
    - Identify ports (domain interfaces) and adapters (infrastructure
      implementations)
    - Application services expose a single run() method; invariants
      live in entities and value objects
    - Bounded contexts communicate through application services or
      domain ports, never through direct adapter coupling
  tasks:
    - Read .agents/skills/guidelines/tdd-practices/ and
      .agents/skills/guidelines/testing-standards/ references before
      creating tasks
    - Tasks with behavior (entities, value objects, application
      services, repositories) use TDD format — RED write failing test
      → GREEN implement → COMMIT (conventional commit) → REFACTOR
    - Tasks without behavior (types, DTOs, wiring) are plain tasks
      without TDD format
    - Order tasks inside-out — domain first, then application, then
      infrastructure
    - Testing strategy per layer:
      - Domain (entities, value objects, domain services) — unit tests
        with bun test (*.test.ts), zero mocks, InMemory fakes only
      - Application (services with run()) — unit tests with InMemory
        repositories (*.test.ts), zero mocks
      - Infrastructure DB/repository adapters — integration tests
        against a real Prisma + PostgreSQL database
        (*.integration.test.ts)
      - Infrastructure HTTP controllers — integration/e2e tests against
        a running Elysia server (*.integration.test.ts)
    - Never mock Prisma directly — use a real test database in
      integration tests
    - Always include a final validation group that runs
      `bun run lint:fix`, `bun run typecheck`, and `bun test`
    - Always end with a final task that commits all changes using a
      Conventional Commits message
